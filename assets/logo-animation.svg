<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Glow -->
<filter id="glow">
<feGaussianBlur stdDeviation="8" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>


<!-- Gradient -->
<linearGradient id="whiteGradient">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#777777"/>
</linearGradient>


</defs>


<!-- BACKGROUND -->

<rect width="1200" height="500" fill="#000000"/>


<!-- TECH GRID -->

<g opacity="0.06" stroke="#ffffff">

<path d="M0 100H1200"/>
<path d="M0 200H1200"/>
<path d="M0 300H1200"/>
<path d="M0 400H1200"/>

<path d="M200 0V500"/>
<path d="M400 0V500"/>
<path d="M600 0V500"/>
<path d="M800 0V500"/>
<path d="M1000 0V500"/>

</g>


<!-- LOGO -->

<g
fill="none"
stroke="url(#whiteGradient)"
stroke-width="14"
stroke-linecap="round"
stroke-linejoin="round"
filter="url(#glow)"
>


<path
id="logo"
d="
M430 150
H770
L430 350
H770
"
stroke-dasharray="1000"
stroke-dashoffset="1000">


<animate
attributeName="stroke-dashoffset"
from="1000"
to="0"
dur="2s"
fill="freeze"/>

</path>


</g>



<!-- TITLE -->

<text
x="600"
y="420"
fill="white"
font-size="42"
font-family="Arial, Helvetica, sans-serif"
font-weight="900"
letter-spacing="14"
text-anchor="middle"
opacity="0">

ZURRI LABS


<animate
attributeName="opacity"
from="0"
to="1"
begin="2s"
dur="1s"
fill="freeze"/>

</text>



<!-- SUBTITLE -->

<text
x="600"
y="465"
fill="#777"
font-size="14"
font-family="Arial, Helvetica, sans-serif"
letter-spacing="7"
text-anchor="middle"
opacity="0">

DIGITAL EXPERIENCES


<animate
attributeName="opacity"
from="0"
to="1"
begin="2.5s"
dur="1s"
fill="freeze"/>


</text>


</svg>
